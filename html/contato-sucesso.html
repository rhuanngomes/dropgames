<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DropGames - Contato enviado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/contato.css">

</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="logo">Drop<span>Games</span></div>

      <nav class="nav">
        <a href="index.html">Início</a>
        <a href="catalogo.html">Catálogo</a>
        <a href="sobre.html">Sobre nós</a>
        <a href="recursos.html">Recursos</a>
        <a href="contato.html" class="nav-active">Contato</a>
      </nav>

      <div class="header-actions">
        <button class="btn secundario">Entrar</button>
        <button class="btn primario">Criar conta</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero hero-sucesso">
      <div class="hero-container">
        <div class="hero-textos">
          <p class="hero-legenda">Entre em contato conosco</p>
          <h1 class="hero-titulo">Você pode falar com o nosso time agora mesmo</h1>
        </div>

        <div class="hero-imagem-wrapper">
          <img src="../img/zelda.png" alt="Arte de jogo" class="hero-imagem">
        </div>
      </div>
    </section>

    <section class="sucesso">
      <div class="sucesso-container">
        <div class="sucesso-icone">✔</div>
        <h2 class="sucesso-titulo">Seu contato foi enviado!</h2>
        <p class="sucesso-subtitulo">Nosso time entrará em contato</p>

        <div class="sucesso-botoes">
          <a href="index.html" class="btn secundario">Voltar para a Home</a>
          <a href="contato.html" class="btn primario">Enviar novo contato</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-logo">Drop<span>Games</span></div>
      <p class="footer-texto">Projeto acadêmico – 2026 – Todos os direitos reservados.</p>
    </div>
  </footer>
</body>
</html>
